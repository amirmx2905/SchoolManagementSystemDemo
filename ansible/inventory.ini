[app_servers]
app1 ansible_host=54.209.209.114 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/school_mgmt_key
app2 ansible_host=13.219.225.61 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/school_mgmt_key

[vault_server]
# Vault is in a private subnet — jump through app1 to reach it
# Vault EC2 has no internet (private subnet, no NAT). Use python3.8 which ships
# with Ubuntu 20.04 — no deadsnakes PPA install required.
vault ansible_host=10.0.3.114 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/school_mgmt_key ansible_python_interpreter=/usr/bin/python3.8 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -i ~/.ssh/school_mgmt_key -o StrictHostKeyChecking=no -W %h:%p ubuntu@54.209.209.114"'

[all:vars]
# StrictHostKeyChecking disabled intentionally — EC2 IPs are ephemeral and
# host keys are not pre-shared. Acceptable for this college project environment.
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3.9
