<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Management System — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #edf2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 1.4rem; color: #1a365d; font-weight: 700; }
    .logo p  { font-size: 0.82rem; color: #718096; margin-top: 0.3rem; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .card h2 { font-size: 1.1rem; color: #2d3748; margin-bottom: 1.5rem; text-align: center; }
    label { display: block; font-size: 0.82rem; color: #4a5568; font-weight: 600; margin-bottom: 0.4rem; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      outline: none;
    }
    input:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
    button {
      width: 100%;
      background: #2b6cb0;
      color: white;
      border: none;
      padding: 0.7rem;
      border-radius: 5px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2c5282; }
    .vault-note {
      margin-top: 1.5rem;
      padding: 0.6rem 0.85rem;
      background: #ebf8ff;
      border-radius: 5px;
      font-size: 0.76rem;
      color: #2c5282;
      text-align: center;
    }
    footer { margin-top: 1.5rem; font-size: 0.75rem; color: #a0aec0; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">
    <h1>🎓 School Management System</h1>
    <p>DevOps Demo — AWS us-east-1</p>
  </div>

  <div class="card">
    <h2>Sign In</h2>
    <label>Email address</label>
    <input type="email" placeholder="you@school.edu">
    <label>Password</label>
    <input type="password" placeholder="••••••••">
    <button>Sign In</button>
    <div class="vault-note">
      🔐 JWT secrets managed by <strong>HashiCorp Vault</strong>
    </div>
  </div>

  <footer>Auth Service &mdash; App1 :3000 &mdash; Provisioned with Terraform + Ansible</footer>
</body>
</html>
