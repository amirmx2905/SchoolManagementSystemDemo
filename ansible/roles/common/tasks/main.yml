---
- name: Update apt cache and upgrade packages
  shell: |
    apt-get update -qq
    DEBIAN_FRONTEND=noninteractive apt-get -y upgrade
  args:
    creates: /var/cache/apt/.ansible-upgraded

- name: Mark apt upgrade done (idempotency flag)
  file:
    path: /var/cache/apt/.ansible-upgraded
    state: touch
    mode: "0644"
  changed_when: false

- name: Install base utilities
  shell: |
    DEBIAN_FRONTEND=noninteractive apt-get install -y curl git ufw unzip
  args:
    creates: /usr/bin/git
